<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUI City Tactical Radar</title>

    <!-- Librería para Mapas Vectoriales en 3D -->
    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenedor del mapa en 3D -->
    <div id="map"></div>

    <!-- Líneas de escaneo estéticas de radar -->
    <div class="radar-scan"></div>

    <!-- Interfaz Holográfica FUI Superpuesta -->
    <div class="fui-overlay">
        <header class="fui-header">
            <div class="fui-title">TACTICAL_RADAR_v3.0.4</div>
            <div class="fui-status">ANG_PITCH: 60° | <span class="pulse">SCAN_ACTIVE</span></div>
        </header>

        <!-- Panel Inferior de Control de Rubros -->
        <main class="fui-panel">
            <h3>[ FILTRAR_NODOS_URBANOS ]</h3>
            <div class="fui-buttons">
                <button onclick="filtrar('gastronomia')">GASTRONOMIA</button>
                <button onclick="filtrar('salud')">MEDICINA</button>
                <button onclick="filtrar('comercios')">LOGISTICA</button>
            </div>
        </main>
    </div>

    <!-- Scripts de Ejecución -->
    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
</body>
</html>
